<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flappy Beaks by Kuwait</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#1a0533;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;
}
header{text-align:center;margin-bottom:14px;}
header h1{
  font-size:30px;font-weight:800;
  background:linear-gradient(135deg,#FF3DA8,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
header p{font-size:13px;color:#c4b5d0;margin-top:2px;}

.section-label{font-size:11px;font-weight:600;color:#9a7baa;margin-bottom:8px;text-align:center;letter-spacing:.06em;text-transform:uppercase;}

.bird-select{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;width:100%;max-width:600px;}
.bird-card{
  background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:8px 10px;cursor:pointer;text-align:center;
  transition:all 0.18s;flex:1;min-width:96px;max-width:112px;
}
.bird-card:hover{border-color:#FF3DA8;transform:translateY(-2px);}
.bird-card.active{border-color:#FF3DA8;background:rgba(255,61,168,0.18);box-shadow:0 0 0 3px rgba(255,61,168,0.18);}
.bird-thumb{
  width:56px;height:56px;border-radius:50%;
  object-fit:cover;display:block;margin:0 auto 6px;
  border:2px solid rgba(255,255,255,0.15);
}
.bird-card.active .bird-thumb{border-color:#FF3DA8;}
.bird-card span{font-size:10px;font-weight:700;color:#e2c8f0;letter-spacing:.03em;}

.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;width:100%;max-width:600px;}
select{
  background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.18);
  color:#fff;padding:8px 12px;border-radius:10px;font-size:13px;flex:1;max-width:180px;
}
option{background:#2d1045;color:#fff;}
button{
  background:linear-gradient(135deg,#FF3DA8,#9B30FF);
  color:#fff;border:none;padding:8px 20px;border-radius:10px;
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
}
button:disabled{opacity:0.5;cursor:default;}
button.sec{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);color:#ddd;font-weight:600;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:600px;margin-bottom:12px;}
.stat{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:9px;text-align:center;}
.stat-label{font-size:11px;color:#c4b5d0;}
.stat-val{font-size:20px;font-weight:700;margin-top:1px;}
.pink{color:#FF69B4;}.purple{color:#c084fc;}

canvas#gameCanvas{border-radius:16px;display:block;max-width:100%;box-shadow:0 4px 32px rgba(0,0,0,0.55);}

.hint{margin-top:12px;font-size:12px;color:#9a7baa;text-align:center;}

.leaderboard{display:none;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:14px;padding:16px;width:100%;max-width:600px;margin-top:14px;backdrop-filter:blur(8px);}
.leaderboard h3{font-size:15px;margin-bottom:10px;color:#FF69B4;}
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:13px;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{color:#9a7baa;width:26px;font-weight:700;}
.lb-bird{width:28px;height:28px;border-radius:50%;object-fit:cover;margin:0 8px;border:1.5px solid rgba(255,255,255,0.2);}
.lb-name{flex:1;color:#e2c8f0;}
.lb-score{font-weight:700;color:#FF69B4;}
</style>
</head>
<body>

<header>
  <h1>🦩 Flappy Beaks</h1>
  <p>by Kuwait</p>
</header>

<div class="section-label">Choose your beak</div>
<div class="bird-select" id="birdSelect"></div>

<div class="controls">
  <select id="difficulty">
    <option value="easy" selected>Easy</option>
    <option value="normal">Normal</option>
    <option value="hard">Hard</option>
    <option value="insane">Insane</option>
  </select>
  <button id="startBtn" onclick="toggleGame()">▶ Start</button>
  <button class="sec" onclick="toggleLeaderboard()">🏆 Leaderboard</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-val pink" id="score">0</div></div>
  <div class="stat"><div class="stat-label">Best</div><div class="stat-val purple" id="best">0</div></div>
  <div class="stat"><div class="stat-label">Streak</div><div class="stat-val pink" id="streak">0</div></div>
  <div class="stat"><div class="stat-label">Bling</div><div class="stat-val purple" id="bling">0</div></div>
</div>

<canvas id="gameCanvas" width="560" height="600"></canvas>

<div class="hint">Click / tap or Space to flap &nbsp;•&nbsp; ✨ collect bling for bonus points</div>
<div class="hint" style="margin-top:4px;color:#6b4d7a;">Made with love by Kuwait 🦩</div>

<div class="leaderboard" id="lbPanel">
  <h3>🏆 Flappy Beaks Leaderboard</h3>
  <div id="lbList"></div>
</div>

function buildSelector() {
  const wrap = document.getElementById('birdSelect');
  wrap.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'bird-card' + (i===0?' active':'');
    card.dataset.id = b.id;
    card.onclick = () => selectBird(b.id);
    const img = document.createElement('img');
    img.src = b.src;
    img.className = 'bird-thumb';
    img.alt = b.name;
    const lbl = document.createElement('span');
    lbl.textContent = b.name;
    card.appendChild(img);
    card.appendChild(lbl);
    wrap.appendChild(card);
  });
}

function selectBird(id) {
  selectedId = id;
  document.querySelectorAll('.bird-card').forEach(c => c.classList.toggle('active', c.dataset.id===id));
}

// ── Audio ──────────────────────────────────────────────────────────────────
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function beep(freq,dur){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.frequency.value=freq;
  g.gain.setValueAtTime(0.07,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function drawBg(){
  if(bgImg){
    ctx.save();
    ctx.filter='blur(7px)';
    const scale=canvas.height/500*1.08;
    const dw=1500*scale, dh=500*scale;
    ctx.drawImage(bgImg,(canvas.width-dw)/2,(canvas.height-dh)/2,dw,dh);
    ctx.filter='none';
    ctx.fillStyle='rgba(8,0,20,0.54)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.restore();
  } else {
    const g=ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,'#1a0533');g.addColorStop(1,'#3b1060');
    ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  clouds.forEach(cl=>{
    ctx.globalAlpha=0.1;ctx.fillStyle='#fff';
    const s=cl.s*30;
    ctx.beginPath();ctx.arc(cl.x,cl.y,s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cl.x+s*.9,cl.y+4,s*.75,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    if(running)cl.x-=.3*cl.s;
    if(cl.x<-90)cl.x=canvas.width+90;
  });
}

function drawBirdImg(img, x, y, w, h, rot, crying){
  if(!img) return;
  ctx.save();
  ctx.translate(x+w/2, y+h/2);
  ctx.rotate(rot);
  ctx.beginPath();
  ctx.arc(0,0,w/2,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img,-w/2,-h/2,w,h);
  ctx.restore();

  if(crying){
    // tears
    ctx.save();
    ctx.translate(x+w/2, y+h/2);
    ctx.fillStyle='rgba(120,200,255,0.88)';
    [[-w*.15,w*.12],[w*.15,w*.12]].forEach(([tx,ty])=>{
      ctx.beginPath();ctx.moveTo(tx,ty);
      ctx.bezierCurveTo(tx-w*.07,ty+w*.1,tx+w*.07,ty+w*.18,tx,ty+w*.3);
      ctx.closePath();ctx.fill();
    });
    // sad mouth arc
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(0,w*.22,w*.14,0.3,Math.PI-0.3);ctx.stroke();
    ctx.restore();
  }

  // glow trail when flying
  if(!crying && running){
    ctx.save();ctx.globalAlpha=.12;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(x+w/2-10,y+h/2,w*.42,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawPipes(){
  pipes.forEach(p=>{
    const grd=ctx.createLinearGradient(p.x,0,p.x+78,0);
    grd.addColorStop(0,'#2e6b30');grd.addColorStop(1,'#52a855');
    ctx.fillStyle=grd;
    if(ctx.roundRect){
      ctx.beginPath();ctx.roundRect(p.x,0,78,p.top,[0,0,8,8]);ctx.fill();
      ctx.beginPath();ctx.roundRect(p.x,p.top+S.gap,78,canvas.height-p.top-S.gap,[8,8,0,0]);ctx.fill();
    } else {
      ctx.fillRect(p.x,0,78,p.top);
      ctx.fillRect(p.x,p.top+S.gap,78,canvas.height-p.top-S.gap);
    }
    ctx.fillStyle='#1b4d1c';
    ctx.fillRect(p.x-3,p.top-13,84,13);
    ctx.fillRect(p.x-3,p.top+S.gap,84,13);
  });
}

function drawPwups(){
  pwups.forEach(u=>{
    ctx.save();ctx.globalAlpha=.92;
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(u.x,u.y,12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#FFA000';ctx.lineWidth=2;ctx.stroke();
    ctx.font='15px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✨',u.x,u.y);
    ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/255;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=5;
  });
  ctx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
}

function burst(x,y,color){
  for(let i=0;i<12;i++){
    const a=(Math.PI*2*i)/12;
    particles.push({x,y,vx:Math.cos(a)*4,vy:Math.sin(a)*3.5,size:3.5,color,life:255});
  }
}

// ── Update ─────────────────────────────────────────────────────────────────
function update(){
  if(!running)return;
  bird.vel+=S.gravity;bird.y+=bird.vel;
  bird.rot=Math.max(-.45,Math.min(.58,bird.vel*.052));
  flapTimer--;if(flapTimer<=0)flapping=false;

  frame++;
  if(frame%S.freq===0){
    const top=Math.random()*(canvas.height-S.gap-120)+60;
    pipes.push({x:canvas.width,top,scored:false});
    if(Math.random()<.42) pwups.push({x:canvas.width-50,y:top+S.gap/2});
  }

  const baseSpeed=DIFF[document.getElementById('difficulty').value].speed;
  const maxSpeed=DIFF[document.getElementById('difficulty').value].speedMax;
  S.speed=Math.min(baseSpeed+score*0.05,maxSpeed);

  pipes=pipes.filter(p=>{
    p.x-=S.speed;
    if(!p.scored&&p.x+78<bird.x){
      p.scored=true;score++;streak++;
      document.getElementById('score').textContent=score;
      document.getElementById('streak').textContent=streak;
      beep(820,.1);burst(bird.x+bird.w/2,bird.y+bird.h/2,'#FF69B4');
    }
    return p.x+78>0;
  });

  pwups=pwups.filter(u=>{
    u.x-=S.speed;
    const dx=(bird.x+bird.w/2)-u.x,dy=(bird.y+bird.h/2)-u.y;
    if(Math.sqrt(dx*dx+dy*dy)<28){
      blingCount++;score+=15;
      document.getElementById('bling').textContent=blingCount;
      document.getElementById('score').textContent=score;
      beep(1300,.18);burst(u.x,u.y,'#FFD700');return false;
    }
    return u.x>-20;
  });

  if(bird.y+bird.h>canvas.height||bird.y<0){endGame();return;}
  pipes.forEach(p=>{
    if(bird.x+bird.w>p.x&&bird.x<p.x+78&&
      (bird.y<p.top||bird.y+bird.h>p.top+S.gap)) endGame();
  });
}

function endGame(){
  running=false;over=true;streak=0;
  beep(300,.15);setTimeout(()=>beep(200,.3),160);
  if(score>best){best=score;localStorage.setItem('fb_best',best);document.getElementById('best').textContent=best;}
  document.getElementById('startBtn').textContent='▶ Play again';
  document.getElementById('startBtn').disabled=false;
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop(){
  drawBg();
  drawPipes();
  drawPwups();
  const img=birdImgs[selectedId];
  drawBirdImg(img,bird.x,bird.y,bird.w,bird.h,bird.rot,false);
  drawParticles();

  if(!running&&!over){
    ctx.fillStyle='rgba(0,0,0,0.42)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
    ctx.fillText('🦩 Pick your Beak & Press Start!',canvas.width/2,canvas.height/2-10);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='14px sans-serif';
    ctx.fillText('Click or tap to flap',canvas.width/2,canvas.height/2+26);
  }

  if(over){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,canvas.width,canvas.height);
    // big crying bird
    const cw=100,ch=100;
    const cx2=canvas.width/2-cw/2, cy2=canvas.height/2-145;
    drawBirdImg(img,cx2,cy2,cw,ch,0,true);
    ctx.fillStyle='#fff';ctx.font='bold 38px sans-serif';ctx.textAlign='center';
    ctx.fillText('Game Over!',canvas.width/2,canvas.height/2-22);
    ctx.font='22px sans-serif';ctx.fillStyle='#FFD700';
    ctx.fillText('Score: '+score,canvas.width/2,canvas.height/2+16);
    ctx.fillStyle='#FF69B4';ctx.font='16px sans-serif';
    ctx.fillText('Best: '+best,canvas.width/2,canvas.height/2+48);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='13px sans-serif';
    ctx.fillText('Tap Play again to try once more!',canvas.width/2,canvas.height/2+78);
  }

  update();
  requestAnimationFrame(loop);
}

// ── Controls ───────────────────────────────────────────────────────────────
function doFlap(){
  if(!running)return;
  bird.vel=-11.2;flapping=true;flapTimer=13;
  beep(600,.08);
}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();doFlap();}});
canvas.addEventListener('click',doFlap);
canvas.addEventListener('touchstart',e=>{e.preventDefault();doFlap();},{passive:false});

function toggleGame(){
  initAudio();
  const diff=document.getElementById('difficulty').value;
  S={...DIFF[diff]};
  if(!running&&!over){
    running=true;
    document.getElementById('startBtn').textContent='Playing…';
    document.getElementById('startBtn').disabled=true;
  } else if(over){
    bird.y=canvas.height/2;bird.vel=0;bird.rot=0;
    pipes=[];pwups=[];particles=[];
    score=0;streak=0;blingCount=0;over=false;frame=0;flapping=false;
    ['score','streak','bling'].forEach(id=>document.getElementById(id).textContent=0);
    running=true;
    document.getElementById('startBtn').textContent='Playing…';
    document.getElementById('startBtn').disabled=true;
  }
}

function toggleLeaderboard(){
  const p=document.getElementById('lbPanel');
  const show=p.style.display==='block';
  p.style.display=show?'none':'block';
  if(!show){
    const entries=[
      {name:'CryptoKing',score:2840,bird:'phantom'},
      {name:'SolanaFlyer',score:2156,bird:'chrome'},
      {name:'NFTMaster',score:1987,bird:'mighty'},
      {name:'Kuwait',score:best||0,bird:'og'},
      {name:'IfeWarrior',score:1450,bird:'ife'},
      {name:'FlamingoFan',score:1200,bird:'og'}
    ].sort((a,b)=>b.score-a.score).map((e,i)=>({...e,rank:i+1}));
    document.getElementById('lbList').innerHTML=entries.map(e=>`
      <div class="lb-row">
        <span class="lb-rank">#${e.rank}</span>
        <img class="lb-bird" src="${BIRD_DEFS.find(b=>b.id===e.bird).src}" alt="${e.bird}"/>
        <span class="lb-name">${e.name}</span>
        <span class="lb-score">${e.score}</span>
      </div>`).join('');
  }
}

loop();
</script>
