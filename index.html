<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flappy Beaks by Kuwait</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #FF69B4, #A855D4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { font-size: 13px; color: #888; margin-top: 4px; }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
    width: 100%;
    max-width: 560px;
  }
  input, select {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    min-width: 120px;
  }
  button {
    background: linear-gradient(135deg, #E85D9E, #A855D4);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  button.secondary {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #ccc;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 16px;
  }
  .stat {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: #888; }
  .stat-val { font-size: 20px; font-weight: 600; margin-top: 2px; }
  .stat-val.pink { color: #FF69B4; }
  .stat-val.purple { color: #A855D4; }
  canvas {
    border-radius: 14px;
    display: block;
    max-width: 100%;
  }
  .hint {
    margin-top: 14px;
    font-size: 12px;
    color: #555;
    text-align: center;
  }
  .leaderboard {
    display: none;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 16px;
    width: 100%;
    max-width: 560px;
    margin-top: 16px;
  }
  .leaderboard h3 { font-size: 15px; margin-bottom: 12px; color: #FF69B4; }
  .lb-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #222;
    font-size: 13px;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { color: #888; width: 24px; }
  .lb-name { flex: 1; margin-left: 8px; }
  .lb-score { font-weight: 600; color: #FF69B4; }
</style>
</head>
<body>

<header>
  <h1>🦩 Flappy Beaks</h1>
  <p>by Kuwait</p>
</header>

<div class="controls">
  <input type="text" id="twitterHandle" placeholder="@yourhandle" />
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="normal" selected>Normal</option>
    <option value="hard">Hard</option>
    <option value="insane">Insane</option>
  </select>
  <button onclick="loadAvatar()">Load avatar</button>
  <button id="startBtn" onclick="toggleGame()">Start game</button>
  <button class="secondary" onclick="toggleLeaderboard()">Leaderboard</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-val pink" id="score">0</div></div>
  <div class="stat"><div class="stat-label">Best</div><div class="stat-val purple" id="best">0</div></div>
  <div class="stat"><div class="stat-label">Streak</div><div class="stat-val pink" id="streak">0</div></div>
  <div class="stat"><div class="stat-label">Bling</div><div class="stat-val purple" id="bling">0</div></div>
</div>

<canvas id="gameCanvas" width="560" height="600"></canvas>

<div class="hint">Click / tap or press Space to flap &nbsp;•&nbsp; Collect ✨ bling for bonus points</div>
<div class="hint" style="margin-top:6px;color:#333;">Made with love by Kuwait 🦩</div>

<div class="leaderboard" id="lbPanel">
  <h3>🏆 Flappy Beaks Leaderboard</h3>
  <div id="lbList"></div>
</div>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const DIFF = {
  easy:   { gravity: 0.45, freq: 140, gap: 145, speed: 4 },
  normal: { gravity: 0.55, freq: 120, gap: 125, speed: 5.5 },
  hard:   { gravity: 0.65, freq: 100, gap: 105, speed: 7 },
  insane: { gravity: 0.78, freq: 82,  gap: 90,  speed: 9 }
};

let S = DIFF.normal;
let bird = { x: 70, y: canvas.height/2, w: 44, h: 44, vel: 0, rot: 0, img: null };
let pipes = [], pwups = [], particles = [];
let score = 0, streak = 0, bling = 0;
let best = +(localStorage.getItem('fb_best') || 0);
let running = false, over = false, frame = 0;
let audioCtx = null;

document.getElementById('best').textContent = best;

const flamingoImg = new Image();
flamingoImg.onload = () => { bird.img = flamingoImg; };
flamingoImg.src = FLAMINGO_SRC;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq, dur) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
  ctx.rotate(bird.rot);
  if (bird.img) {
    ctx.beginPath();
    ctx.arc(0, 0, bird.w/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(bird.img, -bird.w/2, -bird.h/2, bird.w, bird.h);
  } else {
    ctx.fillStyle = '#FF69B4';
    ctx.beginPath();
    ctx.arc(0, 0, bird.w/2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawPipes() {
  pipes.forEach(p => {
    const grad = ctx.createLinearGradient(p.x, 0, p.x + 78, 0);
    grad.addColorStop(0, '#1a3d1a');
    grad.addColorStop(1, '#2d6b2d');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(p.x, 0, 78, p.top, [0, 0, 8, 8]);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(p.x, p.top + S.gap, 78, canvas.height - p.top - S.gap, [8, 8, 0, 0]);
    ctx.fill();
    ctx.fillStyle = '#FF69B4';
    ctx.fillRect(p.x - 2, p.top - 10, 82, 10);
    ctx.fillRect(p.x - 2, p.top + S.gap, 82, 10);
  });
}

function drawPwups() {
  pwups.forEach(u => {
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(u.x, u.y, 11, 0, Math.PI*2);
    ctx.fill();
    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✨', u.x, u.y);
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 255;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    p.x += p.vx; p.y += p.vy; p.life -= 6;
  });
  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);
}

function burst(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = (Math.PI*2*i)/10;
    particles.push({ x, y, vx: Math.cos(a)*3.5, vy: Math.sin(a)*3.5, size: 3.5, color, life: 255 });
  }
}

function drawBg() {
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#1a0533');
  bg.addColorStop(1, '#3b1060');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function update() {
  if (!running) return;
  bird.vel += S.gravity;
  bird.y += bird.vel;
  bird.rot = Math.max(-0.45, Math.min(0.55, bird.vel * 0.055));

  frame++;
  if (frame % S.freq === 0) {
    const top = Math.random() * (canvas.height - S.gap - 120) + 60;
    pipes.push({ x: canvas.width, top, scored: false });
    if (Math.random() < 0.38) pwups.push({ x: canvas.width - 50, y: top + S.gap/2 });
  }

  pipes = pipes.filter(p => {
    p.x -= S.speed;
    if (!p.scored && p.x + 78 < bird.x) {
      p.scored = true; score++; streak++;
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      beep(820, 0.1);
      burst(bird.x + bird.w/2, bird.y + bird.h/2, '#FF69B4');
    }
    return p.x + 78 > 0;
  });

  pwups = pwups.filter(u => {
    u.x -= S.speed;
    const dx = (bird.x + bird.w/2) - u.x, dy = (bird.y + bird.h/2) - u.y;
    if (Math.sqrt(dx*dx + dy*dy) < 26) {
      bling++; score += 15;
      document.getElementById('bling').textContent = bling;
      document.getElementById('score').textContent = score;
      beep(1300, 0.18);
      burst(u.x, u.y, '#FFD700');
      return false;
    }
    return u.x > -20;
  });

  if (bird.y + bird.h > canvas.height || bird.y < 0) { endGame(); return; }
  pipes.forEach(p => {
    if (bird.x + bird.w > p.x && bird.x < p.x + 78 &&
        (bird.y < p.top || bird.y + bird.h > p.top + S.gap)) endGame();
  });
}

function endGame() {
  running = false; over = true;
  beep(380, 0.4); streak = 0;
  if (score > best) {
    best = score;
    localStorage.setItem('fb_best', best);
    document.getElementById('best').textContent = best;
  }
  const btn = document.getElementById('startBtn');
  btn.textContent = 'Play again'; btn.disabled = false;
}

function loop() {
  drawBg();
  drawPipes();
  drawPwups();
  drawBird();
  drawParticles();

  if (!running && !over) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🦩 Press Start to fly!', canvas.width/2, canvas.height/2);
  }

  if (over) {
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over!', canvas.width/2, canvas.height/2 - 44);
    ctx.font = '20px sans-serif';
    ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 4);
    ctx.fillStyle = '#FF69B4';
    ctx.font = '15px sans-serif';
    ctx.fillText('Best: ' + best, canvas.width/2, canvas.height/2 + 38);
  }

  update();
  requestAnimationFrame(loop);
}

function flap() { if (running) { bird.vel = -11.5; beep(600, 0.09); } }

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

function toggleGame() {
  initAudio();
  S = DIFF[document.getElementById('difficulty').value];
  if (!running && !over) {
    running = true;
    document.getElementById('startBtn').textContent = 'Playing…';
    document.getElementById('startBtn').disabled = true;
  } else if (over) {
    bird.y = canvas.height/2; bird.vel = 0; bird.rot = 0;
    pipes = []; pwups = []; particles = [];
    score = 0; streak = 0; bling = 0; over = false; frame = 0;
    document.getElementById('score').textContent = 0;
    document.getElementById('streak').textContent = 0;
    document.getElementById('bling').textContent = 0;
    running = true;
    document.getElementById('startBtn').textContent = 'Playing…';
    document.getElementById('startBtn').disabled = true;
  }
}

function loadAvatar() {
  const handle = document.getElementById('twitterHandle').value.replace('@','').trim();
  if (!handle) { alert('Enter your Twitter handle first!'); return; }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { bird.img = img; alert('🦩 Avatar loaded — ready to flap!'); };
  img.onerror = () => { alert('Could not load avatar. Using the flamingo!'); };
  img.src = 'https://unavatar.io/twitter/' + handle;
}

function toggleLeaderboard() {
  const p = document.getElementById('lbPanel');
  const showing = p.style.display === 'block';
  p.style.display = showing ? 'none' : 'block';
  if (!showing) {
    const entries = [
      { rank:1, name:'CryptoKing', score: 2840 },
      { rank:2, name:'SolanaFlyer', score: 2156 },
      { rank:3, name:'NFTMaster', score: 1987 },
      { rank:4, name:'Kuwait', score: best || 0 },
      { rank:5, name:'FlamingoFan', score: 1200 }
    ].sort((a,b) => b.score - a.score).map((e,i) => ({...e, rank: i+1}));
    document.getElementById('lbList').innerHTML = entries.map(e =>
      `<div class="lb-row"><span class="lb-rank">#${e.rank}</span><span class="lb-name">${e.name}</span><span class="lb-score">${e.score}</span></div>`
    ).join('');
  }
}

loop();
</script>
